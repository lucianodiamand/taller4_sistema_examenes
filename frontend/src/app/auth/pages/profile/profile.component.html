<main class="profile-shell">
  <mat-card class="profile-card" appearance="outlined">
    <header class="profile-header">
      <h1>Mi perfil</h1>
      <p>Actualiza tu información personal.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="profile-form">
      <mat-form-field>
        <mat-label>Nombre</mat-label>
        <input matInput type="text" formControlName="name" autocomplete="name" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Usuario</mat-label>
        <input matInput type="text" formControlName="username" readonly />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Rol</mat-label>
        <input matInput type="text" formControlName="role" readonly />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Nueva contraseña</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
      </mat-form-field>

      @if (formError(); as message) {
        <p class="error" role="alert">{{ message }}</p>
      }

      <div class="actions">
        <a mat-button [routerLink]="homeRoute()">Volver</a>
        <button mat-flat-button type="submit" [disabled]="busy()">
          @if (busy()) {
            <mat-spinner diameter="20" />
          } @else {
            <span>Guardar cambios</span>
          }
        </button>
      </div>
    </form>
  </mat-card>
</main>
