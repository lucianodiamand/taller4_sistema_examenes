<main class="shell">
  <mat-card class="card" appearance="outlined">
    <h1>{{ title() }}</h1>
    <p>Sesion iniciada como <strong>{{ username() }}</strong></p>

    <section class="actions-grid">
      <a mat-stroked-button [routerLink]="routes.profile">Mi perfil</a>

      @if (isAdmin()) {
        <a mat-stroked-button [routerLink]="routes.adminUsers">Usuarios</a>
        <a mat-stroked-button [routerLink]="routes.adminAccess">Roles y permisos</a>
      }

      @if (isProfessor()) {
        <a mat-stroked-button [routerLink]="routes.professorGrading">Corregir exámenes</a>
      }

      <button mat-flat-button type="button" (click)="logout()">Cerrar sesion</button>
    </section>
  </mat-card>
</main>
