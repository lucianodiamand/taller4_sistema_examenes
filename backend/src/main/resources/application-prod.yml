spring:
  h2:
    console:
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  jwt:
    issuer: ${APP_JWT_ISSUER:exam-system}
    secret: ${APP_JWT_SECRET}
    access-ttl: ${APP_JWT_ACCESS_TTL:15m}
    refresh-ttl: ${APP_JWT_REFRESH_TTL:7d}
  bootstrap:
    seed-admin: false
