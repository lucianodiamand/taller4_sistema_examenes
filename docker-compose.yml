services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-system-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exam-system-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"
