<main class="auth-shell">
  <section class="auth-card">
    <h1>Registro de estudiante</h1>
    <p>Crea cuenta para rendir examenes.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="name">Nombre</label>
      <input id="name" type="text" formControlName="name" autocomplete="name" />

      <label for="username">Usuario</label>
      <input id="username" type="text" formControlName="username" autocomplete="username" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" autocomplete="new-password" />

      <p class="error" *ngIf="error()">{{ error() }}</p>

      <button type="submit" [disabled]="isSubmitting()">Crear cuenta</button>
    </form>

    <a [routerLink]="loginUrl">Ya tienes cuenta? Inicia sesion</a>
  </section>
</main>
